<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>좀비 시티 — 캐릭터/프롭 갤러리 (개발용)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 20px 24px 60px;
      background: #14141e;
      color: #e8e8f0;
      font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    h2 { font-size: 15px; margin: 28px 0 10px; color: #ffd86a; }
    .hint { font-size: 12px; color: #8a8a9e; margin-bottom: 12px; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; }
    .row-title { font-size: 13px; margin: 14px 0 6px; color: #9ecbff; }
    .row-title .zombie { color: #9ee8a0; }
    .grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .cell {
      background: #1c1c2a;
      border: 1px solid #2c2c3e;
      border-radius: 6px;
      padding: 4px;
      text-align: center;
    }
    .cell .label { font-size: 10px; color: #7a7a92; margin-top: 2px; }
    .props .cell { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .props canvas { margin: auto; }
    #anim-wrap { background: #1c1c2a; border: 1px solid #2c2c3e; border-radius: 8px; padding: 10px; display: inline-block; }
  </style>
</head>
<body>
  <h1>좀비 시티 — 캐릭터/프롭 갤러리</h1>
  <div class="hint">개발용 디버그 페이지입니다. (vite dev 서버에서 /gallery.html 로 접속)</div>
  <div id="app"></div>
  <script type="module" src="/src/gallery.js"></script>
</body>
</html>
